<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .header {
            background: white;
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h2 { color: #667eea; font-size: 22px; }
        .header p { color: #888; font-size: 13px; margin-top: 4px; }

        .btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
        }

        .stat-card p {
            color: #888;
            font-size: 11px;
            margin-top: 4px;
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .chart-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .mood-timeline {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .mood-timeline h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .timeline-item:last-child { border-bottom: none; }

        .mood-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .timeline-content { flex: 1; }
        .timeline-content .msg { font-size: 13px; color: #333; }
        .timeline-content .time { font-size: 11px; color: #aaa; margin-top: 2px; }
        .timeline-emotion { font-size: 12px; font-weight: bold; color: #667eea; }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>📊 Mood Tracker Dashboard</h2>
                <p>Track your emotional wellbeing over time</p>
            </div>
            <a href="http://127.0.0.1:5000/chat-page" class="btn">💬 Back to Chat</a>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3 id="totalSessions">0</h3>
                <p>Total Sessions</p>
            </div>
            <div class="stat-card">
                <h3 id="happyCount">0</h3>
                <p>Happy Moments</p>
            </div>
            <div class="stat-card">
                <h3 id="streakDays">0</h3>
                <p>Day Streak</p>
            </div>
            <div class="stat-card">
                <h3 id="wellnessScore">0%</h3>
                <p>Wellness Score</p>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>🎭 Emotion Distribution</h3>
                <canvas id="emotionPieChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>📈 Mood Over Time</h3>
                <canvas id="moodLineChart"></canvas>
            </div>
        </div>

        <div class="mood-timeline">
            <h3>🕐 Recent Mood Timeline</h3>
            <div id="timelineContainer">Loading...</div>
        </div>
    </div>

    <script>
        const emotionColors = {
            happy: '#28a745',
            grateful: '#17a2b8',
            greeting: '#667eea',
            neutral: '#adb5bd',
            sad: '#6c757d',
            anxious: '#ffc107',
            angry: '#dc3545',
            stressed: '#fd7e14',
            lonely: '#6f42c1',
            tired: '#20c997',
            hopeless: '#343a40',
            crisis: '#dc3545'
        };

        const emotionEmojis = {
            happy: '😊', grateful: '🌟', greeting: '👋',
            neutral: '😐', sad: '😢', anxious: '😰',
            angry: '😤', stressed: '😔', lonely: '💙',
            tired: '😴', hopeless: '😞', crisis: '🆘'
        };

        const moodScores = {
            happy: 5, grateful: 5, greeting: 4,
            neutral: 3, tired: 2, lonely: 2,
            anxious: 2, stressed: 2, sad: 1,
            angry: 1, hopeless: 1, crisis: 0
        };

        async function loadMoodData() {
            try {
                console.log('Fetching data...');
                const response = await fetch('http://127.0.0.1:5000/history', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                       'Content-Type': 'application/json',
                       'Accept': 'application/json'
    }
});
                const data = await response.json();

                if(!data || data.length === 0) {
                    document.getElementById('timelineContainer').innerHTML =
                        '<p style="color:#888; text-align:center;">No mood data yet! Start chatting 💙</p>';
                    return;
                }

                // Calculate stats
                document.getElementById('totalSessions').textContent = data.length;

                const happyCount = data.filter(c =>
                    ['happy', 'grateful'].includes(c.emotion)).length;
                document.getElementById('happyCount').textContent = happyCount;

                const wellnessScore = Math.round(
                    (data.reduce((sum, c) => sum + (moodScores[c.emotion] || 3), 0) /
                    (data.length * 5)) * 100
                );
                document.getElementById('wellnessScore').textContent = wellnessScore + '%';

                // Calculate streak
                const dates = [...new Set(data.map(c => c.timestamp.split(' ')[0]))];
                document.getElementById('streakDays').textContent = dates.length;

                // Emotion distribution pie chart
                const emotionCount = {};
                data.forEach(c => {
                    emotionCount[c.emotion] = (emotionCount[c.emotion] || 0) + 1;
                });

                new Chart(document.getElementById('emotionPieChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(emotionCount).map(e =>
                            `${emotionEmojis[e] || '💙'} ${e}`),
                        datasets: [{
                            data: Object.values(emotionCount),
                            backgroundColor: Object.keys(emotionCount).map(e =>
                                emotionColors[e] || '#667eea'),
                            borderWidth: 2,
                            borderColor: '#fff'
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { font: { size: 11 } } }
                        }
                    }
                });

                // Mood line chart
                const last10 = data.slice(-10);
                new Chart(document.getElementById('moodLineChart'), {
                    type: 'line',
                    data: {
                        labels: last10.map((c, i) => `Chat ${i + 1}`),
                        datasets: [{
                            label: 'Mood Score',
                            data: last10.map(c => moodScores[c.emotion] || 3),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102,126,234,0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: last10.map(c =>
                                emotionColors[c.emotion] || '#667eea'),
                            pointRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                min: 0, max: 5,
                                ticks: {
                                    callback: val => {
                                        const labels = ['', 'Bad', 'Low', 'Okay', 'Good', 'Great'];
                                        return labels[val] || val;
                                    }
                                }
                            }
                        },
                        plugins: { legend: { display: false } }
                    }
                });

                // Timeline
                const recent = [...data].reverse().slice(0, 8);
                const timelineHTML = recent.map(chat => `
                    <div class="timeline-item">
                        <div class="mood-dot"
                             style="background:${emotionColors[chat.emotion] || '#667eea'}">
                        </div>
                        <div class="timeline-content">
                            <div class="msg">${chat.user_message}</div>
                            <div class="time">${chat.timestamp}</div>
                        </div>
                        <div class="timeline-emotion">
                            ${emotionEmojis[chat.emotion] || '💙'} ${chat.emotion}
                        </div>
                    </div>
                `).join('');

                document.getElementById('timelineContainer').innerHTML = timelineHTML;

            } catch(error) {
                console.error('Error:', error);
            }
        }

        console.log('Page loaded!');
        loadMoodData();
    </script>
</body>
</html>
