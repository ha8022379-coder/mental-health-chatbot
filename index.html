<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Chatbot 💙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            background: white;
            width: 420px;
            height: 620px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h2 { font-size: 20px; }
        .chat-header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user { align-items: flex-end; }
        .message.bot { align-items: flex-start; }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
        }

        .user .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .emotion-tag {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
            padding: 0 4px;
        }

        .chat-input {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: border 0.3s;
        }

        .chat-input input:focus { border-color: #667eea; }

        .chat-input button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .chat-input button:hover { opacity: 0.9; }

        .typing {
            display: none;
            padding: 10px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .typing span {
            width: 8px; height: 8px;
            background: #667eea;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .crisis-bar {
    background: #dc3545;
    color: white;
    padding: 10px 15px;
    text-align: center;
    font-size: 13px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.8; }
    100% { opacity: 1; }
}

.helpline-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #dc3545;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(220,53,69,0.4);
    z-index: 1000;
    animation: pulse 1.5s infinite;
}

.helpline-btn:hover { opacity: 0.9; }
.mic-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.3s;
    flex-shrink: 0;
}

.mic-btn.recording {
    background: #dc3545;
    animation: pulse 1s infinite;
}

.mic-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
    <h2>💙 Mental Health Support</h2>
    <p>I'm here to listen. You're not alone.</p>
    <div style="display:flex; gap:15px; justify-content:center; margin-top:5px;">
        <a href="http://127.0.0.1:5000/history-page"
           style="color:white; font-size:12px; opacity:0.8; text-decoration:none;">
           📋 History
        </a>
        <a href="http://127.0.0.1:5000/mood-page"
           style="color:white; font-size:12px; opacity:0.8; text-decoration:none;">
           📊 Mood Tracker
        </a>
    </div>
    <div style="margin-top:8px;">
        <button onclick="setLanguage('en-US')" id="btnEn"
            style="background:white; color:#667eea; border:none; padding:4px 10px;
                   border-radius:10px; cursor:pointer; font-size:11px; font-weight:bold;">
            🇺🇸 English
        </button>
        <button onclick="setLanguage('ur-PK')" id="btnUr"
            style="background:rgba(255,255,255,0.3); color:white; border:none;
                   padding:4px 10px; border-radius:10px; cursor:pointer;
                   font-size:11px; font-weight:bold; margin-left:5px;">
            🇵🇰 اردو
        </button>
    </div>
</div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-bubble">
                    Hello! 👋 I'm here to support you. How are you feeling today?
                </div>
            </div>
        </div>

        <div class="typing" id="typing">
            <span></span><span></span><span></span>
        </div>

        <div class="crisis-bar" id="crisisBar" style="display:none;">
    🆘 If you are in crisis please call:
    <a href="tel:03117786264" style="color:white; font-weight:bold;">
        0311-7786264
    </a>
    &nbsp;|&nbsp;
    <a href="tel:115" style="color:white; font-weight:bold;">
        Rescue 115
    </a>
</div>

<div class="chat-input">
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
    <input
        type="text"
        id="userInput"
        placeholder="Type or speak how you're feeling..."
        onkeypress="handleKeyPress(event)"
    />
    <button onclick="sendMessage()">Send</button>
</div>

<button class="helpline-btn" onclick="toggleHelpline()">
    🆘 Crisis Helpline
</button>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        // Store conversation history
let conversationHistory = [];

async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    input.value = '';

    const typing = document.getElementById('typing');
    typing.style.display = 'block';

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                message: message,
                history: conversationHistory
            })
        });

        const data = await response.json();
        typing.style.display = 'none';

        // Add to conversation history
        conversationHistory.push({ role: 'user', content: message });
        conversationHistory.push({ role: 'assistant', content: data.response });

        // Keep only last 10 messages
        if(conversationHistory.length > 10) {
            conversationHistory = conversationHistory.slice(-10);
        }

        addMessage(data.response, 'bot', data.emotion);
        checkCrisis(data.emotion);
        if(usedVoice === true) {
            setTimeout(() => speakResponse(data.response), 300);
            usedVoice = false;
        }

    } catch (error) {
        typing.style.display = 'none';
        addMessage('Sorry, I am having trouble connecting. Please try again!', 'bot');
    }
}

        function addMessage(text, sender, emotion = null) {
            const chatMessages = document.getElementById('chatMessages');

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            messageDiv.appendChild(bubble);

            if (emotion && sender === 'bot') {
                const tag = document.createElement('div');
                tag.className = 'emotion-tag';
                tag.textContent = `Emotion detected: ${emotion}`;
                messageDiv.appendChild(tag);
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function toggleHelpline() {
    const bar = document.getElementById('crisisBar');
    if(bar.style.display === 'none') {
        bar.style.display = 'block';
    } else {
        bar.style.display = 'none';
    }
}

// Auto show crisis bar if crisis emotion detected
function checkCrisis(emotion) {
    if(emotion === 'crisis') {
        document.getElementById('crisisBar').style.display = 'block';
    }
}
// ---- LANGUAGE SETTINGS ----
let currentLang = 'en-US';
let usedVoice = false; // Track if user spoke

function setLanguage(lang) {
    currentLang = lang;

    // Update button styles
    if(lang === 'en-US') {
        document.getElementById('btnEn').style.background = 'white';
        document.getElementById('btnEn').style.color = '#667eea';
        document.getElementById('btnUr').style.background = 'rgba(255,255,255,0.3)';
        document.getElementById('btnUr').style.color = 'white';
        document.getElementById('userInput').placeholder = 'Type or speak how you\'re feeling...';
    } else {
        document.getElementById('btnUr').style.background = 'white';
        document.getElementById('btnUr').style.color = '#667eea';
        document.getElementById('btnEn').style.background = 'rgba(255,255,255,0.3)';
        document.getElementById('btnEn').style.color = 'white';
        document.getElementById('userInput').placeholder = 'اپنے جذبات لکھیں یا بولیں...';
    }
}

// ---- SPEECH TO TEXT ----
let recognition;
let isRecording = false;

function toggleVoice() {
    if(!isRecording) {
        startRecording();
    } else {
        stopRecording();
    }
}

function startRecording() {
    if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Please use Chrome browser for voice features!');
        return;
    }

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = currentLang;
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isRecording = true;
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('micBtn').textContent = '⏹️';
        document.getElementById('userInput').placeholder =
            currentLang === 'ur-PK' ? 'سن رہا ہوں...' : 'Listening...';
    };

    recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    document.getElementById('userInput').value = transcript;
    usedVoice = true; // Mark that voice was used
    stopRecording();
    setTimeout(() => sendMessage(), 500);
    };

    recognition.onerror = (event) => {
        console.error('Speech error:', event.error);
        stopRecording();
        alert('Could not hear you. Please try again!');
    };

    recognition.onend = () => { stopRecording(); };
    recognition.start();
}

function stopRecording() {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('userInput').placeholder =
        currentLang === 'ur-PK' ? 'اپنے جذبات لکھیں یا بولیں...' : 'Type or speak how you\'re feeling...';
    if(recognition) recognition.stop();
}

// ---- TEXT TO SPEECH ----
function speakResponse(text) {
    if(currentLang === 'ur-PK') {
        // Stop any previous audio
        if(window.currentAudio) {
            window.currentAudio.pause();
            window.currentAudio.src = '';
            window.currentAudio = null;
        }

        // Short text only - trim if too long to reduce delay
        const shortText = text.length > 200 ? text.substring(0, 200) : text;

        const url = 'http://127.0.0.1:5000/urdu-tts?text=' +
            encodeURIComponent(shortText);

        window.currentAudio = new Audio();
        window.currentAudio.preload = 'auto';
        window.currentAudio.src = url;

        window.currentAudio.addEventListener('canplaythrough', () => {
            window.currentAudio.play()
                .then(() => console.log('Urdu playing!'))
                .catch(e => console.error('Error:', e));
        });

        window.currentAudio.load();

    } else {
        if('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            utterance.volume = 1;

            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v =>
                v.name.includes('Zira') ||
                v.name.includes('Samantha') ||
                v.name.includes('Google UK English Female')
            );
            if(femaleVoice) utterance.voice = femaleVoice;
            window.speechSynthesis.speak(utterance);
        }
    }
}
    </script>
    <button class="helpline-btn" onclick="toggleHelpline()">
        🆘 Crisis Helpline
    </button>
</body>
</html>
